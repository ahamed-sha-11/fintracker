services:
  postgres:
    image: postgres:16
    container_name: fintracker-db
    environment:
      POSTGRES_USER: fintracker
      POSTGRES_PASSWORD: fintracker
      POSTGRES_DB: fintracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: fintracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fintracker
      DB_USERNAME: fintracker
      DB_PASSWORD: fintracker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
